name: flutter_secure_storage_windows
description: Pure Dart FFI implementation of flutter_secure_storage for Windows, eliminating C++ compile-time dependency on ATL.
version: 3.1.2

environment:
  sdk: '>=2.12.0 <4.0.0'
  flutter: ">=2.0.0"

dependencies:
  ffi: ^2.1.0
  flutter:
    sdk: flutter
  flutter_secure_storage_platform_interface: ^1.1.2
  path: ^1.8.0
  path_provider: ^2.1.0
  win32: ^5.0.0

flutter:
  plugin:
    implements: flutter_secure_storage
    platforms:
      windows:
        dartPluginClass: FlutterSecureStorageWindows
